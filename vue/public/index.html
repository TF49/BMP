<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <!-- SEO Meta Tags -->
    <title>BMP - 羽毛球场馆管理系统 | 智能预约、运营与数据分析平台</title>
    <meta name="description" content="BMP 羽毛球管理平台，为协会、俱乐部和商业场馆提供场地预约、器材租借、课程管理、赛事组织、会员管理和财务分析一体化解决方案。提升运营效率，降低管理成本。">
    <meta name="keywords" content="羽毛球管理系统,场馆预约系统,体育场馆管理,会员管理系统,课程预约,赛事管理,器材租借,财务管理,数据分析,BMP">
    <meta name="author" content="BMP Team">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bmp.example.com/">
    <meta property="og:title" content="BMP - 羽毛球场馆管理系统">
    <meta property="og:description" content="智能预约、运营与数据分析平台，让羽毛球场馆运营更高效、更清晰">
    <meta property="og:image" content="<%= BASE_URL %>og-image.png">
    <meta property="og:locale" content="zh_CN">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://bmp.example.com/">
    <meta name="twitter:title" content="BMP - 羽毛球场馆管理系统">
    <meta name="twitter:description" content="智能预约、运营与数据分析平台，让羽毛球场馆运营更高效、更清晰">
    <meta name="twitter:image" content="<%= BASE_URL %>og-image.png">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="<%= BASE_URL %>favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="<%= BASE_URL %>favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="<%= BASE_URL %>favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="<%= BASE_URL %>apple-touch-icon.png">

    <!-- Theme Color -->
    <meta name="theme-color" content="#0ea5e9">
    <meta name="msapplication-TileColor" content="#0ea5e9">
  </head>
  <body>
    <noscript>
      <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
  </body>
</html>
