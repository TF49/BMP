<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Defense Template</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #f5f7fb;
        --bg-soft: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --line: rgba(15, 23, 42, 0.1);
        --panel: rgba(255, 255, 255, 0.9);
        --card-bg: rgba(255, 255, 255, 0.95);
        --card-bg-alt: #f8fafc;
        --shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
        --shadow-soft: 0 8px 24px rgba(15, 23, 42, 0.06);
        --accent: #2563eb;
        --accent-2: #f97316;
        --accent-3: #38bdf8;
        --font-display: "Space Grotesk", "Noto Sans SC", sans-serif;
        --font-body: "Noto Sans SC", "PingFang SC", sans-serif;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        background:
          radial-gradient(circle at 8% 12%, rgba(56, 189, 248, 0.12), transparent 32%),
          radial-gradient(circle at 88% 18%, rgba(37, 99, 235, 0.1), transparent 28%),
          radial-gradient(circle at 72% 82%, rgba(249, 115, 22, 0.08), transparent 24%),
          linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 100%);
        color: var(--text);
        font-family: var(--font-body);
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }
      .mesh {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background-image:
          linear-gradient(rgba(15, 23, 42, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(15, 23, 42, 0.04) 1px, transparent 1px);
        background-size: 48px 48px;
        opacity: 0.55;
      }
      .brand-dock, .chapter-dock {
        position: fixed;
        left: 20px;
        z-index: 30;
        padding: 14px 18px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--panel);
        box-shadow: var(--shadow-soft);
        backdrop-filter: blur(20px);
      }
      .brand-dock { top: 18px; max-width: 300px; }
      .presenter-dock {
        position: fixed;
        right: 20px;
        top: 18px;
        z-index: 36;
        padding: 12px 18px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--panel);
        box-shadow: var(--shadow-soft);
        backdrop-filter: blur(20px);
        text-align: right;
        min-width: 148px;
      }
      .presenter-label {
        color: var(--muted);
        font-size: 0.78rem;
        letter-spacing: 0.02em;
      }
      .presenter-name {
        display: inline;
        font-family: var(--font-display);
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--text);
      }
      .presenter-module {
        margin-top: 2px;
        font-size: 0.78rem;
        color: var(--accent);
      }
      .chapter-dock {
        bottom: 18px;
        width: min(300px, calc(100vw - 64px));
        border-left: 3px solid var(--accent);
      }
      .deck-kicker, .chapter-step, .metric-label, .support-label {
        color: var(--muted);
        font-size: 0.74rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .eyebrow {
        display: inline-block;
        margin-bottom: 4px;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(37, 99, 235, 0.08);
        color: var(--accent);
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .deck-title, .chapter-title, .scene-title, .support-title {
        font-family: var(--font-display);
        color: var(--text);
      }
      .deck-title { margin-top: 4px; font-size: 1.02rem; font-weight: 700; }
      .chapter-title { margin-top: 4px; font-size: 0.95rem; font-weight: 700; }
      .deck-subtitle, .chapter-claim, .support-copy, .support-card p, .metric-note {
        color: var(--muted);
        line-height: 1.65;
      }
      .scene-claim {
        color: var(--muted);
        line-height: 1.6;
        font-size: 1.06rem;
      }
      .progress-rail {
        position: fixed;
        right: 22px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 30;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      .progress-line {
        position: absolute;
        top: 10px;
        bottom: 10px;
        width: 2px;
        background: linear-gradient(180deg, rgba(23, 25, 31, 0.06), rgba(23, 25, 31, 0.18));
      }
      .progress-dot {
        position: relative;
        width: 12px;
        height: 12px;
        border: 0;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.15);
        cursor: pointer;
        transition: transform 0.2s ease, background 0.2s ease;
      }
      .progress-dot:hover { background: rgba(37, 99, 235, 0.35); }
      .progress-dot.active {
        background: linear-gradient(135deg, var(--accent), var(--accent-3));
        transform: scale(1.28);
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
      }
      .progress-dot::after {
        content: attr(data-label);
        position: absolute;
        right: 24px;
        top: 50%;
        transform: translateY(-50%);
        padding: 5px 12px;
        border-radius: 999px;
        background: var(--panel);
        border: 1px solid var(--line);
        color: var(--text);
        font-size: 0.78rem;
        box-shadow: var(--shadow-soft);
        opacity: 0;
        white-space: nowrap;
        transition: opacity 0.2s ease;
      }
      .progress-dot:hover::after, .progress-dot.active::after { opacity: 1; }
      .scroll-space { height: 1000vh; }
      .canvas-shell {
        position: fixed;
        inset: 0;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .world { position: absolute; left: 50%; top: 50%; width: 0; height: 0; will-change: transform; }
      .scene {
        position: absolute;
        transform: translate3d(-50%, -50%, 0);
        opacity: 0;
        pointer-events: none;
        max-height: min(86vh, 920px);
        overflow-y: auto;
        scrollbar-width: thin;
      }
      .scene.is-interactive { pointer-events: auto; }
      .scene-shell {
        padding: 36px 38px;
        border-radius: 28px;
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(20px);
      }
      .scene-grid { display: grid; grid-template-columns: minmax(0, 1.08fr) minmax(280px, 0.92fr); gap: 28px; }
      .scene-title {
        margin: 10px 0 0;
        font-size: clamp(2rem, 3.6vw, 3.5rem);
        line-height: 1.05;
        letter-spacing: -0.03em;
        color: var(--text);
      }
      .scene-claim { margin: 14px 0 0; }
      .copy { display: grid; gap: 12px; margin-top: 18px; }
      .copy p { margin: 0; color: var(--text); line-height: 1.7; }
      .metric-row, .support-grid { display: grid; gap: 12px; margin-top: 18px; }
      .metric-row { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
      .metric-card, .support-card {
        padding: 16px 18px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: var(--card-bg);
        box-shadow: var(--shadow-soft);
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      .metric-card:hover, .support-card:hover {
        border-color: rgba(37, 99, 235, 0.22);
        box-shadow: 0 12px 32px rgba(37, 99, 235, 0.08);
      }
      .support-card:first-child {
        background: linear-gradient(165deg, #ffffff 0%, var(--card-bg-alt) 100%);
      }
      .metric-value {
        margin-top: 8px;
        font-family: var(--font-display);
        font-size: 1.75rem;
        line-height: 1;
        color: var(--accent);
        font-weight: 600;
      }
      .support-title { margin: 4px 0 0; font-size: 1.12rem; }
      .support-card strong { display: block; margin-top: 6px; }
      .support-screenshot-hero { margin-top: 18px; }
      .support-screenshot-hero .support-copy { margin-top: 10px; }
      .support-screenshot {
        display: block;
        width: 100%;
        max-height: min(52vh, 520px);
        object-fit: contain;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: #fff;
        box-shadow: var(--shadow-soft);
      }
      .support-card .support-screenshot {
        margin-top: 8px;
        max-height: min(42vh, 380px);
      }
      .support-grid.screenshots {
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }
      .closing-stage { display: grid; place-items: center; min-height: 440px; text-align: center; }
      .scene-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 22px; }
      .scene-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 140px;
        padding: 12px 16px;
        border-radius: 999px;
        border: 1px solid rgba(23, 25, 31, 0.08);
        background: rgba(255, 255, 255, 0.84);
        text-decoration: none;
      }
      .scene-link.primary { background: linear-gradient(135deg, var(--accent), var(--accent-3)); color: #fff; border: 0; }
      body.is-mobile .brand-dock {
        padding: 10px 14px;
      }
      body.is-mobile .deck-kicker {
        font-size: 0.68rem;
      }
      body.is-mobile .deck-title {
        font-size: 0.96rem;
      }
      body.is-mobile .deck-subtitle {
        font-size: 0.78rem;
      }
      @media (max-width: 900px) {
        .scene-grid { grid-template-columns: 1fr; }
      }
      .tree-diagram {
        position: relative;
        margin-top: 8px;
        min-height: 280px;
        border-radius: 22px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(248, 250, 252, 0.88));
        overflow: hidden;
      }
      .tree-diagram svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      .tree-root, .tree-branch {
        position: absolute;
        display: grid;
        place-items: center;
        min-width: 112px;
        max-width: 148px;
        padding: 10px 14px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: var(--shadow-soft);
        font-size: 0.82rem;
        font-weight: 700;
        line-height: 1.3;
        text-align: center;
        white-space: pre-line;
        z-index: 2;
      }
      .tree-root { background: linear-gradient(135deg, var(--accent), var(--accent-3)); color: #fff; }
      .module-divider {
        display: grid;
        place-items: center;
        min-height: 420px;
        text-align: center;
      }
      .module-divider .module-badge {
        display: inline-block;
        margin-bottom: 12px;
        padding: 6px 14px;
        border-radius: 999px;
        background: rgba(37, 99, 235, 0.1);
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .module-divider .presenter-ring {
        display: inline-grid;
        place-items: center;
        width: 88px;
        height: 88px;
        margin: 18px auto 0;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--accent-3));
        color: #fff;
        font-family: var(--font-display);
        font-size: 1.35rem;
        font-weight: 700;
        box-shadow: 0 16px 40px rgba(37, 99, 235, 0.22);
      }
      @media (max-width: 820px) {
        .progress-rail, .chapter-dock, .brand-dock, .presenter-dock { display: none; }
        .scene-shell { padding: 22px; border-radius: 24px; }
      }
      .diagram-panel { margin-top: 4px; }
      .diagram-caption {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 0.88rem;
        line-height: 1.55;
      }
      .flow-rail-diagram {
        position: relative;
        margin-top: 8px;
        min-height: 300px;
        border-radius: 22px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(248, 250, 252, 0.88));
        overflow: hidden;
      }
      .flow-rail-diagram svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      .fr-line {
        fill: none;
        stroke: rgba(37, 99, 235, 0.42);
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-dasharray: 10 14;
        animation: fr-dash 14s linear infinite;
      }
      .fr-line.alt { stroke: rgba(249, 115, 22, 0.5); }
      .fr-line.branch-c { stroke: rgba(14, 165, 233, 0.52); }
      .fr-line.merge { stroke: rgba(15, 23, 42, 0.28); stroke-dasharray: none; }
      @keyframes fr-dash { to { stroke-dashoffset: -120; } }
      .fr-node {
        position: absolute;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        width: auto;
        min-width: 88px;
        max-width: 132px;
        min-height: 72px;
        padding: 10px 14px;
        border-radius: 999px;
        text-align: center;
        font-size: 0.76rem;
        font-weight: 700;
        line-height: 1.32;
        box-shadow: var(--shadow-soft), inset 0 0 0 1px rgba(255, 255, 255, 0.9);
        white-space: pre-line;
        overflow-wrap: anywhere;
        word-break: break-word;
        z-index: 2;
      }
      .fr-node.neutral {
        background: linear-gradient(155deg, rgba(238, 242, 255, 0.98), rgba(199, 210, 254, 0.9));
        color: #4338ca;
        border: 1px solid rgba(99, 102, 241, 0.35);
        max-width: 140px;
        box-shadow: 0 8px 22px rgba(99, 102, 241, 0.12), inset 0 0 0 1px rgba(255, 255, 255, 0.65);
      }
      .fr-node.accent-a { background: linear-gradient(140deg, rgba(37, 99, 235, 0.92), rgba(56, 189, 248, 0.88)); color: #fff; max-width: 136px; }
      .fr-node.accent-b { background: linear-gradient(140deg, rgba(249, 115, 22, 0.92), rgba(251, 191, 36, 0.88)); color: #fff; }
      .fr-node.hub {
        background: linear-gradient(140deg, rgba(30, 41, 59, 0.94), rgba(51, 65, 85, 0.9));
        color: #f8fafc;
        min-width: 120px;
        max-width: 168px;
        min-height: 80px;
        padding: 12px 16px;
        border-radius: 18px;
        font-size: 0.72rem;
        line-height: 1.35;
      }
      .fr-node.end { background: linear-gradient(140deg, rgba(16, 185, 129, 0.9), rgba(52, 211, 153, 0.88)); color: #fff; }
      .pipeline-diagram {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(108px, 1fr));
        gap: 10px;
        margin-top: 8px;
        padding: 16px;
        border-radius: 22px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(241, 248, 253, 0.85));
      }
      .pipeline-step {
        position: relative;
        padding: 14px 12px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: var(--shadow-soft);
        font-size: 0.8rem;
        font-weight: 700;
        line-height: 1.35;
        text-align: center;
      }
      .pipeline-step:not(:last-child)::after {
        content: "→";
        position: absolute;
        right: -14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--accent);
        font-weight: 700;
        z-index: 1;
      }
      .state-machine-diagram {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px 4px;
        margin-top: 12px;
        padding: 14px;
        border-radius: 18px;
        border: 1px dashed rgba(37, 99, 235, 0.22);
        background: rgba(37, 99, 235, 0.04);
      }
      .state-pill {
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid var(--line);
        font-size: 0.76rem;
        font-weight: 700;
        white-space: nowrap;
      }
      .state-pill.active {
        border-color: rgba(37, 99, 235, 0.35);
        background: linear-gradient(135deg, rgba(37, 99, 235, 0.12), rgba(56, 189, 248, 0.1));
        color: var(--accent);
      }
      .state-arrow { color: var(--muted); font-weight: 700; font-size: 0.9rem; }
      .layer-stack-diagram { display: grid; gap: 10px; margin-top: 8px; }
      .stack-layer-card {
        padding: 14px 16px;
        border-radius: 18px;
        border: 1px solid var(--line);
        box-shadow: var(--shadow-soft);
      }
      .stack-layer-card .stack-tag {
        display: block;
        font-size: 0.7rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(15, 23, 42, 0.62);
        margin-bottom: 4px;
      }
      .stack-layer-card strong { display: block; font-family: var(--font-display); font-size: 1rem; margin-bottom: 4px; }
      .stack-layer-card small { color: var(--muted); line-height: 1.5; font-size: 0.82rem; }
      .stack-layer-card.tone-a { background: linear-gradient(135deg, rgba(37, 99, 235, 0.14), rgba(255, 255, 255, 0.95)); }
      .stack-layer-card.tone-b { background: linear-gradient(135deg, rgba(249, 115, 22, 0.14), rgba(255, 255, 255, 0.95)); }
      .stack-layer-card.tone-c { background: linear-gradient(135deg, rgba(56, 189, 248, 0.16), rgba(255, 255, 255, 0.95)); }
      .stack-layer-card.tone-d { background: linear-gradient(135deg, rgba(16, 185, 129, 0.14), rgba(255, 255, 255, 0.95)); }
      .funnel-diagram {
        position: relative;
        min-height: 240px;
        margin-top: 8px;
        border-radius: 22px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(241, 248, 253, 0.82));
        overflow: hidden;
      }
      .funnel-diagram::before {
        content: "";
        position: absolute;
        inset: 64px 28px 72px;
        background:
          linear-gradient(180deg, transparent 0, transparent 28%, rgba(37, 99, 235, 0.08) 28%, rgba(37, 99, 235, 0.08) 72%, transparent 72%),
          radial-gradient(circle at top, rgba(56, 189, 248, 0.2), transparent 56%);
        clip-path: polygon(0 0, 100% 0, 62% 100%, 38% 100%);
      }
      .funnel-input, .funnel-output {
        position: absolute;
        display: grid;
        place-items: center;
        padding: 10px 14px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: var(--shadow-soft);
        font-size: 0.78rem;
        font-weight: 700;
        text-align: center;
      }
      .funnel-input:nth-child(1) { left: 16px; top: 22px; }
      .funnel-input:nth-child(2) { left: 50%; top: 22px; transform: translateX(-50%); }
      .funnel-input:nth-child(3) { right: 16px; top: 22px; }
      .funnel-output { left: 50%; bottom: 22px; transform: translateX(-50%); background: linear-gradient(135deg, rgba(37, 99, 235, 0.12), #fff); color: var(--accent); }
      .diagram-combo { display: grid; gap: 14px; }
      .support-grid.compact { margin-top: 12px; }
      .support-grid.compact .support-card { padding: 12px 14px; }
      .scene-visual .scene-grid,
      .scene-visual-layout { display: block; max-width: 920px; }
      .scene-visual .flow-rail-diagram { min-height: 360px; margin-top: 20px; }
      .scene-visual .funnel-diagram { min-height: 300px; }
      .scene-visual .pipeline-diagram { margin-top: 20px; }
      .scene-visual .state-machine-diagram { margin-top: 16px; justify-content: center; }
      .scene-visual .copy { max-width: 52ch; }
      @media (max-width: 900px) {
        .flow-rail-diagram { min-height: 340px; }
        .pipeline-step:not(:last-child)::after { display: none; }
      }
      @media (prefers-reduced-motion: reduce) {
        .fr-line { animation: none; }
      }
    </style>
  </head>
  <body data-active-scene="opening">
    <div class="mesh" aria-hidden="true"></div>
    <aside class="brand-dock">
      <div class="deck-kicker" id="deckKicker">HTML Defense</div>
      <div class="deck-title" id="deckTitle">Replace me</div>
      <div class="deck-subtitle" id="deckSubtitle">Use `presentationConfig` to define title, subtitle, chapters, and theme.</div>
    </aside>
    <aside class="presenter-dock" aria-live="polite">
      <div class="presenter-label">讲解人：<span class="presenter-name" id="presenterName">—</span></div>
      <div class="presenter-module" id="presenterModule"></div>
    </aside>
    <aside class="chapter-dock">
      <div class="chapter-step" id="chapterStep">01 / 开场</div>
      <div class="chapter-title" id="chapterTitle">开场章节</div>
      <p class="chapter-claim" id="chapterClaim">先把听众带到问题发生的现场。</p>
    </aside>
    <aside class="progress-rail" aria-label="Presentation chapters"><div class="progress-line"></div></aside>
    <main>
      <div class="scroll-space" aria-hidden="true"></div>
      <section class="canvas-shell"><div id="world" class="world"></div></section>
    </main>
    <script>
      // AGENT: replace the following object via scripts/apply_blueprint.py (inject JSON blueprint)
      const presentationConfig = {
  "title": "羽擎 BMP · 项目二：预约与支付",
  "subtitle": "课程设计答辩 · 场地预约闭环与余额支付治理",
  "deckKicker": "BMP Project 2",
  "presentationType": "academic",
  "theme": "brand-roadshow",
  "defaultPresenter": "尹晴",
  "presenters": [
    {
      "name": "尹晴",
      "module": "开场 · 项目简介"
    },
    {
      "name": "阿英莫",
      "module": "预约模块（后端 + Web）"
    },
    {
      "name": "涂家乐",
      "module": "支付模块（后端 + UniApp）"

        return `<figure class="support-screenshot-hero"><img class="support-screenshot" src="${esc(support.image)}" alt="${esc(alt)}" loading="lazy" />${caption}</figure>`;

      function supportItemBody(item) {
        const img = item.image
          ? `<img class="support-screenshot" src="${esc(item.image)}" alt="${esc(item.title || "")}" loading="lazy" />`
          : "";
        const text = item.body ? `<p>${esc(item.body)}</p>` : "";
        return `${img}${text}`;
      }
      function supportHtml(chapter) {
        const support = chapter.support || {};
        const diagramBlock = diagramHtml(chapter);
        const items = support.items && support.items.length ? support.items : [];
        if (chapter.supportHidden && diagramBlock) {
          return `<div>${diagramBlock}${support.copy ? `<p class="support-copy">${esc(support.copy)}</p>` : ""}</div>`;
        }
        if (!items.length && !support.title && !support.copy && !support.image && diagramBlock) {
          return `<div>${diagramBlock}</div>`;
        }
        const fallbackItems = items.length ? items : [{ label: "Slot", title: "Support card", body: "Replace with diagram, screenshot, metric, or comparison." }];
        const hasScreenshots = Boolean(support.image) || fallbackItems.some((item) => item.image);
        const gridClass = [
          "support-grid",
          diagramBlock ? "compact" : "",
          hasScreenshots && fallbackItems.some((item) => item.image) ? "screenshots" : "",
        ]
          .filter(Boolean)
          .join(" ");
        const heroShot = support.image && !fallbackItems.some((item) => item.image) ? supportScreenshotHtml(support) : "";
        return `<div>${diagramBlock}${heroShot}<div class="support-label">${esc(support.label || "Support")}</div><div class="support-title">${esc(support.title || "Supporting evidence")}</div>${!heroShot && support.copy ? `<p class="support-copy">${esc(support.copy)}</p>` : heroShot ? "" : `<p class="support-copy">${esc(support.copy || "Use one strong support area rather than many small decorations.")}</p>`}<div class="${gridClass}">${fallbackItems.map((item) => `<article class="support-card"><div class="support-label">${esc(item.label || "Item")}</div><strong>${esc(item.title || "Untitled")}</strong>${supportItemBody(item)}</article>`).join("")}</div></div>`;
      }
      function sceneShellHtml(chapter) {
        if (chapter.layout === "module") {
          const initial = chapter.presenter ? chapter.presenter.slice(0, 1) : "·";
          return `<div class="scene-shell module-divider"><div><div class="module-badge">${esc(chapter.moduleLabel || chapter.eyebrow || "Module")}</div><h1 class="scene-title">${esc(chapter.title || "Module")}</h1><p class="scene-claim">${esc(chapter.claim || "")}</p>${chapter.body && chapter.body.length ? `<div class="copy">${chapter.body.map((text) => `<p>${esc(text)}</p>`).join("")}</div>` : ""}<div class="presenter-ring" aria-hidden="true">${esc(initial)}</div><p class="support-copy" style="margin-top:14px;text-align:center;">讲解人 · ${esc(chapter.presenter || "")}</p>${diagramHtml(chapter)}</div></div>`;
        }
        if (chapter.layout === "closing") {
          return `<div class="scene-shell closing-stage"><div><div class="eyebrow">${esc(chapter.step || "Closing")}</div><h1 class="scene-title">${esc(chapter.title || "Closing")}</h1><p class="scene-claim">${esc(chapter.claim || "")}</p><div class="copy">${(chapter.body && chapter.body.length ? chapter.body : ["Replace with the final message the audience should remember."]).map((text) => `<p>${esc(text)}</p>`).join("")}</div><div class="scene-links"><a class="scene-link primary" href="#${esc(sceneNames[0])}" data-scene-target="${esc(sceneNames[0])}">返回开场</a><a class="scene-link" href="#${esc(chapter.id)}">停在结尾</a></div></div></div>`;
        }
        if (chapter.layout === "visual") {
          const support = chapter.support || {};
          const shotBlock = supportScreenshotHtml(support);
          const diagramBlock = diagramHtml(chapter);
          const paragraphs = (chapter.body && chapter.body.length ? chapter.body : []).map((text) => `<p>${esc(text)}</p>`).join("");
          const metrics = chapter.metrics && chapter.metrics.length ? `<div class="metric-row">${chapter.metrics.map((item) => `<article class="metric-card"><div class="metric-label">${esc(item.label || "Metric")}</div><div class="metric-value">${esc(item.value || "--")}</div>${item.note ? `<div class="metric-note">${esc(item.note)}</div>` : ""}</article>`).join("")}</div>` : "";
          const visualBlock = shotBlock || diagramBlock || supportHtml(chapter);
          return `<div class="scene-shell scene-visual"><div class="scene-visual-layout"><div class="eyebrow">${esc(chapter.eyebrow || chapter.step || "")}</div><h1 class="scene-title">${esc(chapter.title || "Untitled")}</h1><p class="scene-claim">${esc(chapter.claim || "")}</p>${paragraphs ? `<div class="copy">${paragraphs}</div>` : ""}${metrics}${visualBlock}</div></div>`;
        }
        return `<div class="scene-shell"><div class="scene-grid"><div>${bodyHtml(chapter)}</div><div>${supportHtml(chapter)}</div></div></div>`;
      }
      function bodyHtml(chapter) {
        const paragraphs = (chapter.body && chapter.body.length ? chapter.body : ["Replace chapter copy here."]).map((text) => `<p>${esc(text)}</p>`).join("");
        const metrics = chapter.metrics && chapter.metrics.length ? `<div class="metric-row">${chapter.metrics.map((item) => `<article class="metric-card"><div class="metric-label">${esc(item.label || "Metric")}</div><div class="metric-value">${esc(item.value || "--")}</div>${item.note ? `<div class="metric-note">${esc(item.note)}</div>` : ""}</article>`).join("")}</div>` : "";
        return `<div><div class="eyebrow">${esc(chapter.eyebrow || chapter.step || "")}</div><h1 class="scene-title">${esc(chapter.title || "Untitled")}</h1><p class="scene-claim">${esc(chapter.claim || "")}</p><div class="copy">${paragraphs}</div>${metrics}</div>`;
      }
      function buildScene(chapter, index) {
        const p = scenePos(chapter, index);
        const dot = document.createElement("button");
        dot.className = `progress-dot${index === 0 ? " active" : ""}`;
        dot.type = "button";
        dot.dataset.scene = chapter.id;
        dot.dataset.label = chapter.dotLabel || chapter.title || `Chapter ${index + 1}`;
        progressRail.appendChild(dot);
        const scene = document.createElement("section");
        scene.id = chapter.id;
        scene.className = "scene";
        scene.style.left = `${p.x || 0}px`;
        scene.style.top = `${p.y || 0}px`;
        scene.style.width = `min(${p.width || 1280}px, min(90vw, calc(100vw - 140px)))`;
        scene.innerHTML = sceneShellHtml(chapter);
        world.appendChild(scene);
        sceneMap.set(chapter.id, scene);
        chapterMap.set(chapter.id, chapter);
      }
      presentationConfig.chapters.forEach(buildScene);
      const dots = [...document.querySelectorAll(".progress-dot")];
      const sceneLinks = [...document.querySelectorAll("[data-scene-target]")];
      const keyframes = presentationConfig.keyframes && presentationConfig.keyframes.length
        ? presentationConfig.keyframes
        : buildKeyframesFromScenes();
      let wheelLocked = false;
      let scrollSnapTimer = null;
      function pair() { for (let i = 0; i < keyframes.length - 1; i += 1) if (scrollProgress >= keyframes[i].p && scrollProgress <= keyframes[i + 1].p) return [keyframes[i], keyframes[i + 1]]; return [keyframes[keyframes.length - 1], keyframes[keyframes.length - 1]]; }
      function updateHeader(name) {
        const chapter = chapterMap.get(name);
        if (!chapter) return;
        activeScene = name;
        document.body.dataset.activeScene = name;
        chapterStep.textContent = chapter.step || "";
        chapterTitle.textContent = chapter.title || "";
        chapterClaim.textContent = chapter.claim || "";
        presenterName.textContent = chapter.presenter || presentationConfig.defaultPresenter || "—";
        presenterModule.textContent = chapter.moduleLabel || chapter.module || "";
      }
      function render() {
        const [start, end] = pair();
        const span = end.p - start.p || 1;
        const rawT = clamp((scrollProgress - start.p) / span, 0, 1);
        const t = smooth(rawT);
        const cameraEase = 0.08;
        const visibilityEase = 0.1;
        target.x = lerp(start.camera.x, end.camera.x, t);
        target.y = lerp(start.camera.y, end.camera.y, t);
        target.scale = lerp(start.camera.scale, end.camera.scale, t);
        sceneNames.forEach((name) => { target.visibility[name] = lerp(start.visibility[name], end.visibility[name], t); });
        state.x = lerp(state.x, target.x, cameraEase);
        state.y = lerp(state.y, target.y, cameraEase);
        state.scale = lerp(state.scale, target.scale, cameraEase);
        const anchorY = document.body.classList.contains("is-mobile") ? 50 : 50;
        sceneNames.forEach((name) => {
          state.visibility[name] = lerp(state.visibility[name], target.visibility[name], visibilityEase);
          const el = sceneMap.get(name);
          const opacity = state.visibility[name];
          const lift = (1 - opacity) * 40;
          const sceneScale = 0.94 + opacity * 0.06;
          el.style.opacity = String(opacity);
          el.style.transform = `translate3d(-50%, calc(-${anchorY}% + ${lift}px), 0) scale(${sceneScale})`;
          el.classList.toggle("is-interactive", opacity > 0.5);
        });
        const totalScale = state.scale * baseScale;
        world.style.transform = `translate3d(-50%, -50%, 0) scale(${totalScale}) translate3d(${-state.x}px, ${-state.y}px, 0)`;
        const activeDot = rawT < 0.5 ? start.activeDot : end.activeDot;
        dots.forEach((dot, index) => dot.classList.toggle("active", index === activeDot));
        updateHeader(sceneNames.reduce((best, name) => state.visibility[name] > state.visibility[best] ? name : best, sceneNames[0]));
        requestAnimationFrame(render);
      }
      function scrollToProgress(progress) {
        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
        window.scrollTo({ top: clamp(progress, 0, 1) * maxScroll, behavior: "smooth" });
      }
      function scrollByChapter(direction) {
        const idx = sceneNames.indexOf(activeScene);
        const next = clamp(idx + direction, 0, sceneNames.length - 1);
        scrollToProgress(progressForIndex(next));
      }
      function scrollToScene(name) {
        const index = sceneNames.indexOf(name);
        if (index < 0) return;
        scrollToProgress(progressForIndex(index));
      }
      dots.forEach((dot) => dot.addEventListener("click", () => scrollToScene(dot.dataset.scene)));
      sceneLinks.forEach((link) => link.addEventListener("click", (event) => { event.preventDefault(); scrollToScene(link.dataset.sceneTarget); }));
      window.addEventListener("keydown", (event) => {
        const idx = sceneNames.indexOf(activeScene);
        const tag = event.target && event.target.tagName ? event.target.tagName.toLowerCase() : "";
        if (tag === "input" || tag === "textarea" || tag === "select") return;
        if (event.key === " " || event.code === "Space" || event.key === "ArrowDown" || event.key === "PageDown") {
          event.preventDefault();
          scrollByChapter(1);
          return;
        }
        if (event.key === "ArrowUp" || event.key === "PageUp") { event.preventDefault(); scrollByChapter(-1); }
        if (event.key === "Home") { event.preventDefault(); scrollToScene(sceneNames[0]); }
        if (event.key === "End") { event.preventDefault(); scrollToScene(sceneNames[sceneNames.length - 1]); }
      });
      window.addEventListener("wheel", (event) => {
        if (wheelLocked) {
          event.preventDefault();
          return;
        }
        if (Math.abs(event.deltaY) < 10) return;
        event.preventDefault();
        wheelLocked = true;
        window.setTimeout(() => { wheelLocked = false; }, 720);
        scrollByChapter(event.deltaY > 0 ? 1 : -1);
      }, { passive: false });
      function updateViewportState() {
        const isMobile = window.innerWidth <= 820;
        if (isMobile) {
          baseScale = 1;
        } else {
          const widthScale = window.innerWidth < 1500 ? window.innerWidth / 1500 : 1;
          const heightScale = window.innerHeight < 1080 ? window.innerHeight / 1080 : 1;
          const minScale = window.innerWidth < 1180 || window.innerHeight < 760 ? 0.68 : 0.76;
          baseScale = clamp(Math.min(widthScale, heightScale), minScale, 1);
        }
        document.body.classList.toggle("is-mobile", isMobile);
      }
      function updateScrollProgress() {
        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
        scrollProgress = maxScroll <= 0 ? 0 : clamp(window.scrollY / maxScroll, 0, 1);
      }
      window.addEventListener("resize", updateViewportState);
      window.addEventListener("scroll", () => {
        updateScrollProgress();
        if (scrollSnapTimer) window.clearTimeout(scrollSnapTimer);
        scrollSnapTimer = window.setTimeout(() => {
          scrollToProgress(progressForIndex(indexFromProgress(scrollProgress)));
        }, 160);
      }, { passive: true });
      deckTitle.textContent = presentationConfig.title || "Replace me";
      deckSubtitle.textContent = presentationConfig.subtitle || "";
      deckKicker.textContent = presentationConfig.deckKicker || "HTML Defense";
      applyTheme(presentationConfig.theme || "product-narrative");
      updateViewportState();
      updateHeader(sceneNames[0]);
      updateScrollProgress();
      render();
    </script>
  </body>
</html>
