<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Defense Template</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #f4f1eb;
        --bg-soft: #fbfaf6;
        --text: #17191f;
        --muted: #5d6472;
        --line: rgba(23, 25, 31, 0.1);
        --panel: rgba(255, 255, 255, 0.72);
        --panel-strong: rgba(255, 255, 255, 0.86);
        --card-bg: rgba(255, 255, 255, 0.88);
        --card-bg-alt: rgba(248, 250, 252, 0.92);
        --shadow: 0 24px 80px rgba(21, 28, 45, 0.1);
        --shadow-soft: 0 10px 32px rgba(21, 28, 45, 0.07);
        --accent: #0f62fe;
        --accent-2: #ff7d4d;
        --accent-3: #63b5ff;
        --grid-line: rgba(20, 20, 30, 0.06);
        --font-display: "Space Grotesk", "Noto Sans SC", sans-serif;
        --font-body: "Noto Sans SC", "PingFang SC", sans-serif;
        --slide-width: min(1400px, calc(100vw - 200px));
        --scene-prose-max-w: min(100%, calc(var(--slide-width) - 96px));
        --slide-max-h: min(86vh, 10000000px);
        --slide-inner-max-h: var(--slide-max-h);
        --slide-demo-shell-h: min(var(--slide-inner-max-h), calc(100vh - 48px));
        --slide-demo-width: min(1480px, calc(100vw - 176px));
        --demo-video-max-h: min(62vh, 640px);
        --font-title: clamp(1.75rem, 3.2vw, 2.85rem);
        --font-claim: clamp(1rem, 1.45vw, 1.15rem);
        --font-body-slide: clamp(0.95rem, 1.35vw, 1.08rem);
        --font-metric: clamp(1.2rem, 2vw, 1.65rem);
        --card-pad-y: 20px;
        --card-pad-x: 22px;
        --card-min-h: 128px;
        --card-grid-gap: 16px;
        --card-grid-max-w: min(100%, 1180px);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      html {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      html::-webkit-scrollbar {
        width: 0;
        height: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-body);
        overflow-x: hidden;
        overflow-y: hidden;
        -webkit-font-smoothing: antialiased;
      }

      .stage-backdrop {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
        background:
          radial-gradient(circle at 6% 8%, color-mix(in srgb, var(--accent-3) 24%, transparent), transparent 30%),
          radial-gradient(circle at 84% 14%, color-mix(in srgb, var(--accent) 20%, transparent), transparent 26%),
          radial-gradient(circle at 68% 86%, color-mix(in srgb, var(--accent-2) 18%, transparent), transparent 24%),
          linear-gradient(165deg, var(--bg-soft) 0%, var(--bg) 42%, color-mix(in srgb, var(--bg) 90%, var(--accent-3) 10%) 100%);
      }
      .mesh-grid,
      .mesh-noise {
        position: absolute;
        inset: 0;
      }
      .mesh-grid {
        background-image:
          linear-gradient(var(--grid-line) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
        background-size: 48px 48px;
        opacity: 0.5;
      }
      .mesh-noise {
        background-image: radial-gradient(rgba(255, 255, 255, 0.55) 0.7px, transparent 0.7px);
        background-size: 9px 9px;
        opacity: 0.22;
        mix-blend-mode: soft-light;
      }
      .mesh-glow {
        position: absolute;
        width: min(32vw, 380px);
        height: min(32vw, 380px);
        min-width: 220px;
        min-height: 220px;
        border-radius: 50%;
        filter: blur(72px);
        opacity: 0.5;
      }
      .mesh-glow-a {
        left: -8vw;
        top: 2vh;
        background: radial-gradient(circle, color-mix(in srgb, var(--accent-3) 32%, transparent) 0%, transparent 68%);
        animation: floatGlow 24s ease-in-out infinite;
      }
      .mesh-glow-b {
        right: -6vw;
        top: 10vh;
        background: radial-gradient(circle, color-mix(in srgb, var(--accent) 28%, transparent) 0%, transparent 68%);
        animation: floatGlow 30s ease-in-out infinite reverse;
      }
      .mesh-glow-c {
        right: 12vw;
        bottom: -8vh;
        background: radial-gradient(circle, color-mix(in srgb, var(--accent-2) 26%, transparent) 0%, transparent 68%);
        animation: floatGlow 28s ease-in-out infinite;
      }
      @keyframes floatGlow {
        0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
        50% { transform: translate3d(0, -16px, 0) scale(1.05); }
      }
      main,
      .canvas-shell {
        position: relative;
        z-index: 1;
      }
      .brand-dock, .chapter-dock, .presenter-dock {
        backdrop-filter: blur(18px) saturate(1.08);
        -webkit-backdrop-filter: blur(18px) saturate(1.08);
      }
      .brand-dock, .chapter-dock {
        position: fixed;
        left: 16px;
        z-index: 30;
        width: min(204px, calc(100vw - 88px));
        padding: 10px 13px;
        border: 1px solid var(--line);
        border-radius: 16px;
        border-left: 3px solid var(--accent);
        background: var(--panel-strong);
        box-shadow: var(--shadow-soft);
      }
      .brand-dock {
        top: 14px;
      }
      .brand-dock .deck-kicker {
        font-size: 0.68rem;
        letter-spacing: 0.06em;
      }
      .brand-dock .deck-title {
        margin-top: 3px;
        font-size: 0.84rem;
        line-height: 1.32;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .brand-dock .deck-subtitle {
        margin-top: 4px;
        font-size: 0.72rem;
        line-height: 1.42;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .presenter-dock {
        position: fixed;
        right: 20px;
        top: 18px;
        z-index: 36;
        padding: 12px 18px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--panel-strong);
        box-shadow: var(--shadow-soft);
        text-align: right;
        min-width: 148px;
      }
      .presenter-label {
        color: var(--muted);
        font-size: 0.78rem;
        letter-spacing: 0.02em;
      }
      .presenter-name {
        display: inline;
        font-family: var(--font-display);
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--text);
      }
      .presenter-module {
        margin-top: 2px;
        font-size: 0.78rem;
        color: var(--accent);
      }
      .chapter-dock {
        bottom: 14px;
      }
      .chapter-dock .chapter-step {
        font-size: 0.68rem;
      }
      .chapter-dock .chapter-title {
        margin-top: 3px;
        font-size: 0.84rem;
        line-height: 1.32;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .chapter-dock .chapter-claim {
        margin: 4px 0 0;
        font-size: 0.72rem;
        line-height: 1.42;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .deck-kicker, .chapter-step, .metric-label, .support-label {
        color: var(--muted);
        font-size: 0.74rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .eyebrow {
        display: inline-block;
        margin-bottom: 4px;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(37, 99, 235, 0.08);
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .deck-title, .chapter-title, .scene-title, .support-title {
        font-family: var(--font-display);
        color: var(--text);
      }
      .deck-title { margin-top: 4px; font-size: 1.02rem; font-weight: 700; }
      .chapter-title { margin-top: 4px; font-size: 0.95rem; font-weight: 700; }
      .deck-subtitle, .chapter-claim, .support-copy, .support-card p, .metric-note {
        color: var(--muted);
        line-height: 1.65;
      }
      .progress-rail {
        position: fixed;
        right: 22px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 30;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      .progress-line {
        position: absolute;
        top: 10px;
        bottom: 10px;
        width: 2px;
        background: linear-gradient(180deg, rgba(23, 25, 31, 0.06), rgba(23, 25, 31, 0.18));
      }
      .progress-dot {
        position: relative;
        width: 12px;
        height: 12px;
        border: 0;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.15);
        cursor: pointer;
        transition: transform 0.2s ease, background 0.2s ease;
      }
      .progress-dot:hover { background: rgba(37, 99, 235, 0.35); }
      .progress-dot.active {
        background: linear-gradient(135deg, var(--accent), var(--accent-3));
        transform: scale(1.28);
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
      }
      .progress-dot::after {
        content: attr(data-label);
        position: absolute;
        right: 24px;
        top: 50%;
        transform: translateY(-50%);
        padding: 5px 12px;
        border-radius: 999px;
        background: var(--panel);
        border: 1px solid var(--line);
        color: var(--text);
        font-size: 0.78rem;
        box-shadow: var(--shadow-soft);
        opacity: 0;
        white-space: nowrap;
        transition: opacity 0.2s ease;
      }
      .progress-dot:hover::after, .progress-dot.active::after { opacity: 1; }
      .scroll-space { height: 1000vh; }
      .canvas-shell {
        position: fixed;
        inset: 0;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .world { position: absolute; left: 50%; top: 50%; width: 0; height: 0; will-change: transform; }
      .scene {
        position: absolute;
        transform: translate3d(-50%, -50%, 0);
        opacity: 0;
        pointer-events: none;
        width: var(--slide-width) !important;
        max-height: none;
        overflow: visible;
      }
      .scene.is-interactive { pointer-events: auto; }
      .scene-shell {
        box-sizing: border-box;
        width: 100%;
        margin: 0 auto;
        padding: 32px 40px;
        border-radius: 26px;
        border: 1px solid color-mix(in srgb, var(--line) 80%, transparent);
        background: var(--panel-strong);
        box-shadow: var(--shadow);
        backdrop-filter: blur(22px) saturate(1.06);
        -webkit-backdrop-filter: blur(22px) saturate(1.06);
        overflow-x: hidden;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: stretch;
        min-height: 0;
        max-height: var(--slide-inner-max-h, var(--slide-max-h));
        height: auto;
      }
      .scene-shell > * {
        width: 100%;
        flex: 0 1 auto;
        min-height: 0;
        max-height: none;
        margin-block: 0;
      }
      .scene-grid {
        display: grid;
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        gap: 16px 0;
        align-items: start;
        justify-content: center;
        justify-items: stretch;
        margin: 0 auto;
      }
      .scene-grid > * { min-width: 0; width: 100%; }
      .scene-grid > *:first-child {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        min-width: 0;
        text-align: center;
      }
      .scene-grid > *:first-child .scene-claim,
      .scene-grid > *:first-child .copy {
        width: 100%;
        max-width: var(--scene-prose-max-w);
        margin-inline: auto;
        text-align: center;
        word-break: keep-all;
        overflow-wrap: anywhere;
      }
      .scene-grid > *:first-child .copy {
        gap: 3px;
        margin-top: 2px;
      }
      .scene-grid > *:first-child .copy p {
        text-align: center;
        word-break: keep-all;
      }
      .scene-grid > *:first-child .metric-row {
        align-self: center;
        width: 100%;
        max-width: var(--card-grid-max-w);
        margin-top: 6px;
        margin-inline: auto;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        text-align: center;
      }
      .scene-grid > *:first-child .metric-card {
        text-align: center;
      }
      .scene-grid > *:last-child {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .scene-grid .support-label,
      .scene-grid .support-title,
      .scene-grid .support-copy {
        text-align: center;
        width: 100%;
      }
      .scene-grid .support-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        width: 100%;
        max-width: var(--card-grid-max-w);
        margin-inline: auto;
        align-self: center;
      }
      .scene-grid .support-grid:has(.support-card:nth-child(2):last-child) {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .scene-grid .pipeline-diagram,
      .scene-grid .state-machine-diagram {
        justify-content: center;
      }
      .scene-title {
        margin: 8px 0 0;
        font-size: var(--font-title);
        line-height: 1.08;
        letter-spacing: -0.03em;
        color: var(--text);
      }
      .scene-claim {
        margin: 10px 0 0;
        font-size: var(--font-claim);
        line-height: 1.5;
      }
      .copy { display: grid; gap: 10px; margin-top: 14px; }
      .copy p {
        margin: 0;
        color: var(--text);
        font-size: var(--font-body-slide);
        line-height: 1.62;
      }
      .copy-compact p { font-size: var(--font-body-slide); line-height: 1.52; }
      .metric-row, .support-grid { display: grid; gap: var(--card-grid-gap); margin-top: 14px; }
      .metric-row { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
      .metric-card, .support-card {
        min-width: 0;
        min-height: var(--card-min-h);
        padding: var(--card-pad-y) var(--card-pad-x);
        border-radius: 16px;
        border: 1px solid var(--line);
        background: var(--card-bg);
        box-shadow: var(--shadow-soft);
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      .metric-card:hover, .support-card:hover {
        border-color: rgba(37, 99, 235, 0.22);
        box-shadow: 0 12px 32px rgba(37, 99, 235, 0.08);
      }
      .support-card:first-child {
        background: linear-gradient(165deg, #ffffff 0%, var(--card-bg-alt) 100%);
      }
      .metric-value {
        margin-top: 8px;
        font-family: var(--font-display);
        font-size: var(--font-metric);
        line-height: 1.15;
        color: var(--accent);
        font-weight: 600;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .metric-note {
        font-size: 0.82rem;
        line-height: 1.4;
        margin-top: 6px;
      }
      .metric-label, .support-label {
        font-size: 0.78rem;
      }
      .support-title { margin: 4px 0 0; font-size: 1.05rem; }
      .support-card strong {
        display: block;
        margin-top: 6px;
        font-size: 0.95rem;
        line-height: 1.35;
        overflow-wrap: anywhere;
      }
      .support-card p {
        font-size: 0.88rem;
        line-height: 1.48;
        margin: 6px 0 0;
      }
      .support-screenshot-hero { margin-top: 18px; }
      .support-screenshot-hero .support-copy { margin-top: 10px; }
      img.support-screenshot {
        display: block;
        width: 100%;
        max-height: min(52vh, 520px);
        object-fit: contain;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: #fff;
        box-shadow: var(--shadow-soft);
      }
      video.support-video,
      video.support-screenshot {
        display: block;
        width: 100%;
        height: auto;
        object-fit: unset;
        border-radius: 14px;
        border: 1px solid var(--line);
        box-shadow: var(--shadow-soft);
      }
      .support-card .support-screenshot {
        margin-top: 8px;
        max-height: min(42vh, 380px);
      }
      .support-grid.screenshots {
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }
      .support-grid.videos {
        margin-top: 14px;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }
      .support-video {
        background: #0f1419;
      }
      .scene-demo {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 28px 36px 32px;
        min-height: 0;
      }
      .scene-demo .scene-title {
        max-width: 18ch;
      }
      .scene-demo .scene-claim {
        max-width: 42ch;
        margin-left: auto;
        margin-right: auto;
      }
      .demo-video-wrap {
        width: min(100%, 1080px);
        margin-top: 18px;
      }
      .demo-video-wrap .support-video {
        max-height: min(70vh, 680px);
        width: 100%;
      }
      .scene-demo .demo-caption {
        margin-top: 12px;
        max-width: 48ch;
      }
      .scene-closing {
        padding: 26px 30px 24px;
      }
      .closing-layout {
        display: grid;
        grid-template-columns: minmax(0, 1.08fr) minmax(0, 0.92fr);
        gap: 14px 26px;
        align-items: center;
        width: 100%;
      }
      .closing-head {
        grid-column: 1 / -1;
        text-align: center;
        padding-bottom: 2px;
      }
      .closing-head .scene-claim {
        margin-top: 8px;
        max-width: 52ch;
        margin-left: auto;
        margin-right: auto;
      }
      .closing-head .scene-title {
        font-size: clamp(1.45rem, 2.6vw, 2.15rem);
      }
      .closing-col-main .copy {
        margin-top: 0;
        gap: 6px;
      }
      .closing-col-main .copy p {
        font-size: 0.86rem;
        line-height: 1.5;
      }
      .closing-col-side {
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-width: 0;
      }
      .closing-col-side .metric-row {
        margin-top: 0;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .closing-col-side .metric-card {
        min-height: 108px;
        padding: 14px 16px;
      }
      .closing-col-side .metric-value {
        font-size: 1.1rem;
      }
      .closing-layout-single {
        grid-template-columns: 1fr;
      }
      .closing-foot {
        grid-column: 1 / -1;
        text-align: center;
        padding-top: 10px;
        margin-top: 2px;
        border-top: 1px solid var(--line);
      }
      .closing-thanks {
        margin: 0 0 10px;
        font-size: 0.88rem;
        line-height: 1.5;
        color: var(--muted);
      }
      .closing-foot .scene-links {
        margin-top: 0;
      }
      @media (max-width: 900px) {
        .closing-layout {
          grid-template-columns: 1fr;
        }
      }
      .scene-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 22px; }
      .scene-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 140px;
        padding: 12px 16px;
        border-radius: 999px;
        border: 1px solid rgba(23, 25, 31, 0.08);
        background: rgba(255, 255, 255, 0.84);
        text-decoration: none;
      }
      .scene-link.primary { background: linear-gradient(135deg, var(--accent), var(--accent-3)); color: #fff; border: 0; }
      body.is-mobile .brand-dock {
        padding: 10px 14px;
      }
      body.is-mobile .deck-kicker {
        font-size: 0.68rem;
      }
      body.is-mobile .deck-title {
        font-size: 0.96rem;
      }
      body.is-mobile .deck-subtitle {
        font-size: 0.78rem;
      }
      @media (max-width: 900px) {
        .scene-grid { grid-template-columns: 1fr; }
        .scene-grid .support-grid {
          grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        }
      }
      .tree-diagram {
        position: relative;
        margin-top: 4px;
        min-height: 200px;
        max-height: 220px;
        border-radius: 22px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(248, 250, 252, 0.88));
        overflow: hidden;
      }
      .tree-diagram svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      .tree-root, .tree-branch {
        position: absolute;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        min-width: 112px;
        max-width: 148px;
        padding: 10px 14px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: var(--shadow-soft);
        font-size: 0.82rem;
        font-weight: 700;
        line-height: 1.3;
        text-align: center;
        overflow-wrap: anywhere;
        word-break: break-word;
        z-index: 2;
      }
      .tree-root { background: linear-gradient(135deg, var(--accent), var(--accent-3)); color: #fff; }
      .scene-shell.module-divider {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        gap: 8px;
        min-height: 0;
        max-height: var(--slide-inner-max-h, var(--slide-max-h));
        text-align: center;
        overflow-x: hidden;
        overflow-y: auto;
      }
      .module-divider-body {

        const isMobile = window.innerWidth <= 820;
        document.body.classList.toggle("is-mobile", isMobile);
        document.body.classList.toggle("presentation-stage", !isMobile);
        if (isMobile) {
          baseScale = 1;
          root.style.removeProperty("--slide-inner-max-h");
          root.style.removeProperty("--slide-inner-min-h");
          root.style.removeProperty("--slide-demo-shell-h");
          root.style.removeProperty("--slide-demo-width");
          root.style.removeProperty("--demo-video-max-h");
          return;
        }
        const availW = Math.max(320, window.innerWidth - STAGE_PAD_X);
        const availH = slideInnerBudgetHeight();
        const fit = Math.min(availW / STAGE_DESIGN_W, availH / STAGE_DESIGN_H);
        baseScale = clamp(fit, 0.88, 1.14);
        root.style.setProperty("--slide-inner-max-h", `${Math.round(availH)}px`);
        root.style.removeProperty("--slide-inner-min-h");
        const demoShellH = Math.max(520, Math.round(window.innerHeight - 48));
        const demoShellW = Math.max(960, Math.round(window.innerWidth - 188));
        const demoVideoMaxH = Math.max(360, demoShellH - 200);
        root.style.setProperty("--slide-demo-shell-h", `${demoShellH}px`);
        root.style.setProperty("--slide-demo-width", `${demoShellW}px`);
        root.style.setProperty("--demo-video-max-h", `${demoVideoMaxH}px`);
      }
      function updateScrollProgress() {
        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
        scrollProgress = maxScroll <= 0 ? 0 : clamp(window.scrollY / maxScroll, 0, 1);
      }
      window.addEventListener("resize", updateViewportState);
      window.addEventListener("scroll", () => {
        updateScrollProgress();
        if (finaleStarted) {
          pinScrollToEnd();
          return;
        }
        if (scrollSnapTimer) window.clearTimeout(scrollSnapTimer);
        scrollSnapTimer = window.setTimeout(() => {
          scrollToProgress(progressForIndex(indexFromProgress(scrollProgress)));
        }, 160);
      }, { passive: true });
      deckTitle.textContent = presentationConfig.title || "Replace me";
      deckSubtitle.textContent = presentationConfig.subtitle || "";
      deckKicker.textContent = presentationConfig.deckKicker || "HTML Defense";
      applyTheme(presentationConfig.theme || "product-narrative");
      updateViewportState();
      updateHeader(sceneNames[0]);
      updateScrollProgress();
      render();
      if (finaleLayer) {
        finaleLayer.addEventListener("click", (event) => {
          if (finaleStarted) {
            event.preventDefault();
            exitFinale();
          }
        });
      }
    </script>
  </body>
</html>
