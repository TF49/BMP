对应 Booking.MODE_SHARED 与 MODE_PACKAGE。`},{label:`风险`,value:`占场不付`,note:`待支付订单需可配置超时并自动取消。`}],support:{label:`Scenario`,title:`典型场景卡片`,copy:`用三个情境帮助听众进入业务现场。`,items:[{label:`A`,title:`拼场预约`,body:`多人共享同一时段，按人头或时段计价。`},{label:`B`,title:`包场预约`,body:`独占场地，需提前 2 小时等规则约束。`},{label:`C`,title:`待支付占场`,body:`下单成功但未付款，场地处于锁定状态。`}]},scenePos:{x:0,y:1480,width:1280}},{id:`split`,step:`03 / 架构`,title:`双轨讲解：预约 Web · 支付 UniApp`,dotLabel:`架构`,claim:`答辩按项目二要求拆分：预约 = 后端 + Web，支付 = 后端 + UniApp，共用同一 API。`,sceneRole:`diagram`,cameraIntent:`compare`,diagramNeed:`high`,layout:`diagram`,eyebrow:`One backend · Two frontends`,body:[`预约线：Web 用户/管理端 → BookingController → BookingServiceImpl → MySQL。`,`支付线：UniApp 订单页 → /api/booking/payment + /api/payment/auto-cancel/config。`,`Web 端也有 PaymentPayCountdown，与小程序共用配置；演示上按双端分工展示。`],metrics:[{label:`预约前端`,value:`Vue Web`,note:`BookingManagement.vue · user/Booking.vue`},{label:`支付前端`,value:`UniApp`,note:`booking/confirm.vue · usePaymentAutoCancel.ts`}],support:{label:`Diagram`,title:`双轨架构图`,copy:`四层结构：Web / UniApp → Spring Boot → MySQL（biz_booking + biz_booking_court）。`,items:[{label:`Track A`,title:`预约模块`,body:`Web → BookingController → BookingServiceImpl → 主单+明细表`},{label:`Track B`,title:`支付模块`,body:`UniApp → payment API + auto-cancel config → 定时扫描释放`},{label:`Shared`,title:`统一后端`,body:`JWT 鉴权 · 同一套订单状态机 · 财务流水联动`}]},scenePos:{x:1480,y:2600,width:1280}},{id:`booking_design`,step:`04 / 预约设计`,title:`预约域：主单 + 明细与状态机`,dotLabel:`预约`,claim:`预约采用主单 biz_booking + 明细 biz_booking_court，冲突以明细为准，状态 0–4 驱动全流程。`,sceneRole:`diagram`,cameraIntent:`compare`,diagramNeed:`high`,layout:`diagram`,eyebrow:`BookingServiceImpl`,body:[`创建预约时写入主单（会员、模式、日期、金额）与场地明细（多场地、时段）。`,`拼场/包场决定定价策略：SHARED_HOUR、SHARED_TIME、PACKAGE_HOUR。`,`状态：0 已取消 → 1 待支付 → 2 已支付 → 3 进行中 → 4 已完成。`],metrics:[{label:`数据表`,value:`2 张`,note:`biz_booking + biz_booking_court`},{label:`状态码`,value:`0 – 4`,note:`BookingController 注释定义的五态流转。`}],support:{label:`Diagram`,title:`预约下单流程`,copy:`流程：选场 → 校验冲突 → 写主单+明细 → 状态置为
