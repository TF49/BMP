spring.application.name=BMP

# 环境配置（默认开发环境，生产环境通过环境变量SPRING_PROFILES_ACTIVE=prod切换）
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# 服务器端口配置
server.port=9090

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/badminton?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 字符编码配置
server.servlet.encoding.force=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true

# MyBatis配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.badminton.bmp.modules.system.entity
# 开启驼峰命名转换
mybatis.configuration.map-underscore-to-camel-case=true

# Jackson配置 - 添加日期格式化
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=GMT+8

# 上传文件配置
# 上传根目录（相对项目运行目录）
bmp.upload-dir=./uploads
# 上传大小限制（可按需调整）
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# ==================== Redis 缓存 ====================
# 本地无 Redis 时请注释掉下面 4 行（host/port/password/timeout），否则启动会尝试连接 Redis 并报错；注释后使用内存缓存。
# 生产环境请部署 Redis 并配置，再取消下方注释启用 Redis 缓存。
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=5000ms
# 启用 Redis 作为缓存实现时取消下一行注释（需 Redis 服务已启动）
# spring.cache.type=redis

# ==================== SpringDoc / Swagger ====================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ==================== JWT配置 ====================
# JWT密钥（生产环境强烈建议通过环境变量 JWT_SECRET 设置，至少256位）
# 为了本地开发方便，这里提供一个默认值（32 字节），如果未配置 JWT_SECRET 就会使用它
jwt.secret=${JWT_SECRET:12345678901234567890123456789012}
# AccessToken有效期（毫秒），默认2小时
jwt.expiration=${JWT_EXPIRATION:7200000}
# RefreshToken有效期（毫秒），默认7天
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# WebSocket 允许的来源（逗号分隔，生产环境请配置正式域名）
bmp.websocket.allowed-origin-patterns=${WS_ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:8080}

# ==================== Weather / QWeather ====================
bmp.weather.qweather.key=${QWEATHER_API_KEY:}
bmp.weather.qweather.weather-base=${QWEATHER_WEATHER_BASE:https://api.qweather.com/v7}
bmp.weather.qweather.geo-base=${QWEATHER_GEO_BASE:https://geoapi.qweather.com/v2}
bmp.weather.qweather.default-location=${QWEATHER_DEFAULT_LOCATION:101010100}

# ==================== 腾讯位置服务（逆地理编码，小程序填地址） ====================
# 在 https://lbs.qq.com/ 申请 WebServiceAPI Key，填写到环境变量或下方默认值
bmp.map.tencent.key=${TENCENT_MAP_KEY:}
