# ==================== 生产环境配置 ====================

# 日志配置 - 生产环境
logging.level.root=WARN
logging.level.com.badminton.bmp=INFO
logging.level.org.springframework=WARN
logging.level.org.mybatis=WARN
logging.level.java.sql=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# 日志文件配置 - 生产环境（50MB滚动，保留30天）
# logging.file.name=logs/bmp-prod.log
logging.file.max-size=50MB
logging.file.max-history=30
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# 关闭SQL日志
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.nologging.NoLoggingImpl

# Swagger禁用
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# ==================== Redis 缓存（生产环境，需先部署 Redis 再启用） ====================
# spring.data.redis.host=${REDIS_HOST:localhost}
# spring.data.redis.port=${REDIS_PORT:6379}
# spring.data.redis.password=${REDIS_PASSWORD:}
# spring.data.redis.timeout=5000ms
# spring.cache.type=redis

# ==================== HikariCP 连接池（生产环境） ====================
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# ==================== CORS（生产环境） ====================
# 生产环境必须通过环境变量 CORS_ALLOWED_ORIGINS 配置允许的前端域名（逗号分隔）
bmp.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# 逆地理编码依赖环境变量 TENCENT_MAP_KEY（与 application.properties 中 bmp.map.tencent.key 对应）

# ==================== 业务订单支付超时自动取消（生产安全默认值） ====================
bmp.payment.auto-cancel.enabled=${BMP_PAYMENT_AUTO_CANCEL_ENABLED:true}
bmp.payment.auto-cancel.timeout-seconds=${BMP_PAYMENT_AUTO_CANCEL_TIMEOUT_SECONDS:900}
bmp.payment.auto-cancel.scan-interval-ms=${BMP_PAYMENT_AUTO_CANCEL_SCAN_INTERVAL_MS:60000}
