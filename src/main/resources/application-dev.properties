# ==================== 开发环境配置 ====================

# 日志配置 - 开发环境
logging.level.root=INFO
logging.level.com.badminton.bmp=DEBUG
logging.level.org.springframework=INFO
logging.level.org.mybatis=DEBUG
logging.level.java.sql=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# 日志文件配置
logging.file.name=logs/bmp-dev.log
logging.file.max-size=10MB
logging.file.max-history=7
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# MyBatis SQL日志
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Swagger启用
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ==================== WebSocket / SockJS（开发环境） ====================
# 你现在是用局域网 IP（例如 http://172.18.213.109:8080）访问前端，
# Spring 的 SockJS 会做 Origin 校验，不在白名单就会对 /ws/info、/ws/** 返回 403。
# 生产环境请务必改成“明确域名/端口”的白名单，不要用宽泛通配。
bmp.websocket.allowed-origin-patterns=${WS_ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:8080,http://10.*.*.*:8080,http://192.168.*.*:8080,http://172.16.*.*:8080,http://172.17.*.*:8080,http://172.18.*.*:8080,http://172.19.*.*:8080,http://172.20.*.*:8080,http://172.21.*.*:8080,http://172.22.*.*:8080,http://172.23.*.*:8080,http://172.24.*.*:8080,http://172.25.*.*:8080,http://172.26.*.*:8080,http://172.27.*.*:8080,http://172.28.*.*:8080,http://172.29.*.*:8080,http://172.30.*.*:8080,http://172.31.*.*:8080}
