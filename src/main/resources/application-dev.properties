# ==================== 开发环境配置 ====================

# 日志配置 - 开发环境
logging.level.root=INFO
logging.level.com.badminton.bmp=DEBUG
logging.level.org.springframework=INFO
logging.level.org.mybatis=DEBUG
logging.level.java.sql=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# 日志文件配置
logging.file.name=logs/bmp-dev.log
logging.file.max-size=10MB
logging.file.max-history=7
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# MyBatis SQL日志
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Swagger启用
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ==================== WebSocket / SockJS（开发环境） ====================
# SockJS 会校验浏览器 Origin；固定端口/网段列表无法覆盖「IP 会变、前端端口会变（如 8082）」的场景。
# 开发环境默认允许任意 Origin（*）。生产请用 prod 配置或设置 WS_ALLOWED_ORIGINS 为明确源列表。
bmp.websocket.allowed-origin-patterns=${WS_ALLOWED_ORIGINS:*}

# 腾讯地图 WebService Key：勿写在此文件。在父级 application.properties 中已绑定为
# bmp.map.tencent.key=${TENCENT_MAP_KEY:}
# 设置环境变量 TENCENT_MAP_KEY 即可（各环境通用）。
# Windows PowerShell 当前会话：  $env:TENCENT_MAP_KEY="你的key"
# Windows 持久用户级：            [Environment]::SetEnvironmentVariable("TENCENT_MAP_KEY","你的key","User")
# IDEA 运行：Run Configuration → Environment variables → TENCENT_MAP_KEY=你的key
